services:
  homepage:
    image: ${HOMEPAGE_IMAGE:-ghcr.io/gethomepage/homepage:v1.10.1}
    container_name: homepage
    ports:
      - "${SERVER_BIND_IP:-127.0.0.1}:3000:3000"
    volumes:
      - ${DASHBOARD_CONFIG_DIR:-./configs/homepage}:/app/config
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-localhost:3000,127.0.0.1:3000}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - dashboard

  glances:
    image: ${GLANCES_IMAGE:-nicolargo/glances:latest}
    container_name: glances
    ports:
      - "${SERVER_BIND_IP:-127.0.0.1}:61208:61208"
    volumes:
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - GLANCES_OPT=${GLANCES_OPT:--w}
    restart: unless-stopped
    pid: host
    security_opt:
      - no-new-privileges:true
    networks:
      - dashboard

  # Opcional: no forma parte del stack desplegado actualmente en /srv/docker/dashboard/stack.
  portainer:
    image: ${PORTAINER_IMAGE:-portainer/portainer-ce:latest}
    container_name: portainer
    ports:
      - "${SERVER_BIND_IP:-127.0.0.1}:9000:9000"
      - "${SERVER_BIND_IP:-127.0.0.1}:9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - dashboard

networks:
  dashboard:
    driver: bridge

volumes:
  portainer_data:
